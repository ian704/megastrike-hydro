<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Megastrike Hydro Drilling Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --deep-navy: #0a1628;
    --navy: #0d1b2a;
    --ocean-blue: #1b263b;
    --azure: #415a77;
    --gold: #e9c46a;
    --orange: #f4a261;
    --white: #ffffff;
    --text-light: #e0e1dd;
    --text-muted: #778da9;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #dc2626;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, var(--deep-navy) 0%, var(--navy) 50%, var(--ocean-blue) 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
    color: var(--text-light);
}

/* Animated Background */
.bg-pattern {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(circle at 20% 50%, rgba(233, 196, 106, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(244, 162, 97, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(233, 196, 106, 0.02) 0%, transparent 50%);
    z-index: 0;
    pointer-events: none;
}

/* Gold accent line */
.container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gold), var(--orange), var(--gold));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
}

@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* Container */
.container {
    background: rgba(27, 38, 59, 0.95);
    backdrop-filter: blur(20px);
    padding: 50px 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 
                0 0 0 1px rgba(233, 196, 106, 0.1) inset;
    position: relative;
    z-index: 10;
    animation: slideUp 0.6s ease-out;
    border: 1px solid rgba(233, 196, 106, 0.1);
    overflow: visible;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Logo Section - Irregular Organic Background */
.logo {
    text-align: center;
    margin-bottom: 30px;
    position: relative;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo-wrapper {
    position: relative;
    display: inline-block;
    padding: 10px 20px;
}

.logo-wrapper::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 110%;
    height: 180%;
    background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.98) 0%, rgba(255, 255, 255, 0.85) 25%, rgba(255, 255, 255, 0.6) 50%, rgba(255, 255, 255, 0.3) 70%, rgba(255, 255, 255, 0) 100%);
    border-radius: 60% 40% 70% 30% / 40% 50% 60% 50%;
    z-index: -1;
    filter: blur(6px);
    opacity: 0.9;
    animation: organicMorph 8s ease-in-out infinite;
}

.logo-wrapper::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 115%;
    background: radial-gradient(ellipse at 70% 80%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.5) 40%, rgba(255, 255, 255, 0.2) 70%, rgba(255, 255, 255, 0) 100%);
    border-radius: 40% 60% 30% 70% / 60% 30% 70% 40%;
    z-index: -2;
    filter: blur(10px);
    opacity: 0.7;
    animation: organicMorph 10s ease-in-out infinite reverse;
}

.logo-wrapper:hover::before {
    opacity: 1;
    filter: blur(5px);
}

.logo-wrapper:hover::after {
    opacity: 0.9;
    filter: blur(8px);
}

@keyframes organicMorph {
    0%, 100% {
        border-radius: 60% 40% 70% 30% / 40% 50% 60% 50%;
    }
    25% {
        border-radius: 40% 60% 50% 50% / 60% 40% 60% 40%;
    }
    50% {
        border-radius: 50% 50% 40% 60% / 50% 60% 40% 60%;
    }
    75% {
        border-radius: 70% 30% 60% 40% / 40% 60% 50% 50%;
    }
}

.logo-img {
    height: 120px;
    width: auto;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    position: relative;
    z-index: 1;
    display: block;
}

/* Form Grid */
.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.form-group {
    position: relative;
    margin-bottom: 20px;
}

.form-group.full-width {
    grid-column: 1 / -1;
}

.input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    transition: color 0.3s ease;
    pointer-events: none;
}

input {
    width: 100%;
    padding: 14px 14px 14px 48px;
    border: 1px solid rgba(233, 196, 106, 0.2);
    border-radius: 0;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    background: rgba(10, 22, 40, 0.5);
    color: white;
}

input:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(233, 196, 106, 0.1);
}

input:focus + .input-icon {
    color: var(--gold);
}

input::placeholder {
    color: var(--text-muted);
}

.password-toggle {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1rem;
    transition: color 0.3s ease;
    user-select: none;
}

.password-toggle:hover {
    color: var(--gold);
}

/* Password Strength Indicator */
.password-strength {
    height: 3px;
    background: rgba(233, 196, 106, 0.1);
    margin-top: 8px;
    overflow: hidden;
    display: none;
}

.password-strength.show {
    display: block;
}

.strength-bar {
    height: 100%;
    width: 0;
    transition: all 0.3s ease;
}

.strength-bar.weak { width: 33%; background: var(--error); }
.strength-bar.medium { width: 66%; background: var(--warning); }
.strength-bar.strong { width: 100%; background: var(--success); }

.strength-text {
    font-size: 0.8rem;
    margin-top: 5px;
    color: var(--text-muted);
    display: none;
}

.strength-text.show {
    display: block;
}

/* Terms Checkbox */
.terms {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 25px 0;
    font-size: 0.9rem;
    color: var(--text-muted);
    cursor: pointer;
}

.terms input[type="checkbox"] {
    width: auto;
    padding: 0;
    margin-top: 3px;
    accent-color: var(--gold);
    cursor: pointer;
}

.terms a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.terms a:hover {
    color: var(--orange);
    text-decoration: underline;
}

/* Button Styling */
button[type="submit"] {
    width: 100%;
    padding: 16px;
    background: var(--gold);
    color: var(--deep-navy);
    border: 2px solid var(--gold);
    border-radius: 0;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}

button[type="submit"]:hover {
    background: transparent;
    color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(233, 196, 106, 0.2);
}

button[type="submit"]:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

button[type="submit"].success {
    background: var(--success);
    border-color: var(--success);
    color: white;
}

/* Divider */
.divider {
    display: flex;
    align-items: center;
    margin: 30px 0;
    color: var(--text-muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.divider::before,
.divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(233, 196, 106, 0.2);
}

.divider span {
    padding: 0 15px;
}

/* Social Signup */
.social-signup {
    display: flex;
    gap: 12px;
    margin-bottom: 25px;
}

.social-btn {
    flex: 1;
    padding: 12px;
    border: 1px solid rgba(233, 196, 106, 0.2);
    background: rgba(10, 22, 40, 0.5);
    border-radius: 0;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: 700;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.social-btn:hover {
    border-color: var(--gold);
    background: rgba(233, 196, 106, 0.1);
    color: var(--gold);
    transform: translateY(-2px);
}

/* Footer */
.footer-text {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 20px;
}

.footer-text a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.footer-text a:hover {
    color: var(--orange);
    text-decoration: underline;
}

/* Error/Success Messages */
.message {
    padding: 14px;
    border-radius: 0;
    font-size: 0.9rem;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 10px;
    animation: slideDown 0.3s ease;
    border-left: 3px solid;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.message.show {
    display: flex;
}

.message.error {
    background: rgba(220, 38, 38, 0.1);
    color: #ef4444;
    border-left-color: var(--error);
}

.message.success {
    background: rgba(16, 185, 129, 0.1);
    color: var(--success);
    border-left-color: var(--success);
}

/* Responsive */
@media (max-width: 480px) {
    .container {
        padding: 40px 25px;
    }
    
    .form-row {
        grid-template-columns: 1fr;
    }
    
    .logo-img {
        height: 150px;
    }
    
    .logo-wrapper::before {
        width: 115%;
        height: 135%;
        filter: blur(5px);
    }
    
    .logo-wrapper::after {
        width: 105%;
        height: 120%;
        filter: blur(8px);
    }
}

/* Input Animation on Load */
.form-group {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.6s ease forwards;
}

.form-group:nth-child(1) { animation-delay: 0.1s; }
.form-group:nth-child(2) { animation-delay: 0.15s; }
.form-group:nth-child(3) { animation-delay: 0.2s; }
.form-group:nth-child(4) { animation-delay: 0.25s; }
.form-group:nth-child(5) { animation-delay: 0.3s; }
.form-group:nth-child(6) { animation-delay: 0.35s; }

@keyframes fadeInUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="bg-pattern"></div>

<div class="container">
    <div class="logo">
        <div class="logo-wrapper">
            <img src="images/logo.png" alt="Megastrike Hydro Drilling Solutions" class="logo-img">
        </div>
    </div>

    <div class="message error" id="errorMsg">
        <span>⚠️</span>
        <span>Please fill in all required fields</span>
    </div>

    <h2>Create Account</h2>

    <form action="/signup" method="POST" id="signupForm">
        <div class="form-row">
            <div class="form-group">
                <span class="input-icon">👤</span>
                <input type="text" name="firstName" placeholder="First Name" required id="firstName">
            </div>
            <div class="form-group">
                <span class="input-icon">👤</span>
                <input type="text" name="lastName" placeholder="Last Name" required id="lastName">
            </div>
        </div>

        <div class="form-group full-width">
            <span class="input-icon">📧</span>
            <input type="email" name="email" placeholder="Email Address" required id="email">
        </div>

        <div class="form-group full-width">
            <span class="input-icon">📱</span>
            <input type="tel" name="phone" placeholder="Phone Number" id="phone">
        </div>

        <div class="form-group full-width">
            <span class="input-icon">🔒</span>
            <input type="password" name="password" placeholder="Create Password" required id="password">
            <span class="password-toggle" id="togglePassword">👁️</span>
        </div>
        
        <div class="password-strength" id="strengthBar">
            <div class="strength-bar" id="strengthIndicator"></div>
        </div>
        <div class="strength-text" id="strengthText">Password strength: <span id="strengthLabel">Weak</span></div>

        <div class="form-group full-width">
            <span class="input-icon">🔒</span>
            <input type="password" name="confirmPassword" placeholder="Confirm Password" required id="confirmPassword">
        </div>

        <label class="terms">
            <input type="checkbox" required id="termsCheck">
            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
        </label>

        <button type="submit" id="submitBtn">
            <span>Create Account</span>
            <span>→</span>
        </button>
    </form>

    <div class="divider">
        <span>OR</span>
    </div>

    <div class="social-signup">
        <button type="button" class="social-btn" title="Google">G</button>
        <button type="button" class="social-btn" title="Microsoft">M</button>
    </div>

    <p class="footer-text">Already have an account? <a href="login.html">Sign in</a></p>
</div>

<script>
// Password visibility toggle
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

togglePassword.addEventListener('click', function() {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.textContent = type === 'password' ? '👁️' : '🙈';
});

// Password strength checker
const strengthBar = document.getElementById('strengthBar');
const strengthIndicator = document.getElementById('strengthIndicator');
const strengthText = document.getElementById('strengthText');
const strengthLabel = document.getElementById('strengthLabel');

passwordInput.addEventListener('input', function() {
    const password = this.value;
    
    if (password.length > 0) {
        strengthBar.classList.add('show');
        strengthText.classList.add('show');
    } else {
        strengthBar.classList.remove('show');
        strengthText.classList.remove('show');
        return;
    }
    
    let strength = 0;
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
    if (password.match(/[0-9]/)) strength++;
    if (password.match(/[^a-zA-Z0-9]/)) strength++;
    
    strengthIndicator.className = 'strength-bar';
    
    if (strength <= 1) {
        strengthIndicator.classList.add('weak');
        strengthLabel.textContent = 'Weak';
        strengthLabel.style.color = 'var(--error)';
    } else if (strength === 2 || strength === 3) {
        strengthIndicator.classList.add('medium');
        strengthLabel.textContent = 'Medium';
        strengthLabel.style.color = 'var(--warning)';
    } else {
        strengthIndicator.classList.add('strong');
        strengthLabel.textContent = 'Strong';
        strengthLabel.style.color = 'var(--success)';
    }
});

// Form validation and submission
const form = document.getElementById('signupForm');
const submitBtn = document.getElementById('submitBtn');
const errorMsg = document.getElementById('errorMsg');
const confirmPassword = document.getElementById('confirmPassword');

form.addEventListener('submit', async function(e) {
    e.preventDefault();
    errorMsg.classList.remove('show');
    
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = passwordInput.value;
    const confirmPass = confirmPassword.value;
    
    if (password !== confirmPass) {
        showError('Passwords do not match');
        confirmPassword.style.borderColor = 'var(--error)';
        return;
    }
    
    if (password.length < 8) {
        showError('Password must be at least 8 characters');
        return;
    }
    
    if (!document.getElementById('termsCheck').checked) {
        showError('Please accept the Terms of Service');
        return;
    }
    
    const originalContent = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span>Creating account...</span> <span>⏳</span>';
    
    try {
        const BACKEND_URL = 'https://megastrike-hydro.onrender.com'; 

        const response = await fetch(`${BACKEND_URL}/api/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ firstName, lastName, email, phone, password })
        });
        
        const data = await response.json();
        if (data.success) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            
            submitBtn.classList.add('success');
            submitBtn.innerHTML = '<span>Success! Redirecting...</span> <span>✓</span>';
            
            setTimeout(() => {
                if (data.user && data.user.role === 'admin') {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/dashboard.html';
                }
            }, 1500);

        } else {
            throw new Error(data.error || 'Registration failed');
        }
    } catch (error) {
        console.error('Signup error:', error);
        showError(error.message || 'Network error. Please try again.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalContent;
    }
});

function showError(msg) {
    errorMsg.querySelector('span:last-child').textContent = msg;
    errorMsg.classList.add('show');
}

confirmPassword.addEventListener('input', function() {
    if (this.value !== passwordInput.value) {
        this.style.borderColor = 'var(--error)';
    } else {
        this.style.borderColor = 'var(--gold)';
    }
});

document.querySelectorAll('input').forEach(input => {
    input.addEventListener('focus', function() {
        this.style.borderColor = 'rgba(233, 196, 106, 0.2)';
    });
});
</script>

</body>
</html>
