<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Megastrike Hydro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-navy: #0a1628;
            --navy: #0d1b2a;
            --ocean-blue: #1b263b;
            --gold: #e9c46a;
            --orange: #f4a261;
            --text-light: #e0e1dd;
            --text-muted: #778da9;
            --success: #10b981;
            --error: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--deep-navy) 0%, var(--navy) 50%, var(--ocean-blue) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-light);
        }

        .container {
            background: rgba(27, 38, 59, 0.95);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(233, 196, 106, 0.1);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--orange), var(--gold));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-img {
            height: 120px;
            width: auto;
            filter: drop-shadow(0 4px 15px rgba(233, 196, 106, 0.3));
        }

        h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(233, 196, 106, 0.2);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background: rgba(10, 22, 40, 0.5);
            color: white;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(233, 196, 106, 0.1);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: var(--deep-navy);
            border: 2px solid var(--gold);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            background: transparent;
            color: var(--gold);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 14px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            border-left: 3px solid;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.show { display: flex; }
        .message.error { background: rgba(220, 38, 38, 0.1); color: #ef4444; border-color: var(--error); }
        .message.success { background: rgba(16, 185, 129, 0.1); color: var(--success); border-color: var(--success); }
        .message.info { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-color: #3b82f6; }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: var(--orange);
            text-decoration: underline;
        }

        .step { display: none; }
        .step.active { display: block; }

        .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .code-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            padding: 0;
        }

        .resend {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .resend a {
            color: var(--gold);
            cursor: pointer;
            text-decoration: underline;
        }

        .resend a:hover {
            color: var(--orange);
        }

        @media (max-width: 480px) {
            .container { padding: 40px 25px; }
            .logo-img { height: 100px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <img src="images/logo.png" alt="Megastrike" class="logo-img">
    </div>

    <!-- Step 1: Enter Email -->
    <div class="step active" id="step1">
        <h2>Forgot Password?</h2>
        <p class="subtitle">Enter your email to receive a reset code</p>
        
        <div class="message error" id="error1"></div>
        
        <form id="form1">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            <button type="submit" id="btn1">
                <span>Send Reset Code</span>
                <span>→</span>
            </button>
        </form>
    </div>

    <!-- Step 2: Enter Code -->
    <div class="step" id="step2">
        <h2>Verify Code</h2>
        <p class="subtitle">Enter the 6-digit code sent to <strong id="emailDisplay"></strong></p>
        
        <div class="message error" id="error2"></div>
        
        <form id="form2">
            <div class="form-group">
                <label>Reset Code</label>
                <input type="text" id="code" placeholder="123456" maxlength="6" required>
            </div>
            <button type="submit" id="btn2">
                <span>Verify Code</span>
                <span>→</span>
            </button>
        </form>
        
        <div class="resend">
            Didn't receive it? <a onclick="resendCode()">Resend code</a>
        </div>
    </div>

    <!-- Step 3: New Password -->
    <div class="step" id="step3">
        <h2>Reset Password</h2>
        <p class="subtitle">Create a new password for your account</p>
        
        <div class="message error" id="error3"></div>
        <div class="message success" id="success3"></div>
        
        <form id="form3">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Min 8 characters" required minlength="8">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            </div>
            <button type="submit" id="btn3">
                <span>Reset Password</span>
                <span>→</span>
            </button>
        </form>
    </div>

    <div class="back-link">
        <a href="login.html">← Back to Login</a>
    </div>
</div>

<script>
const BACKEND_URL = 'https://megastrike-hydro.onrender.com';
let currentEmail = '';
let tempToken = '';

// Step 1: Send reset code
document.getElementById('form1').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn1');
    const email = document.getElementById('email').value.trim();
    currentEmail = email;
    
    btn.disabled = true;
    btn.innerHTML = '<span>Sending...</span> <span>⏳</span>';
    hideError('error1');
    
    try {
        const res = await fetch(`${BACKEND_URL}/api/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });
        
        const data = await res.json();
        
        if (data.success) {
            document.getElementById('emailDisplay').textContent = email;
            showStep(2);
        } else {
            showError('error1', data.error || 'Failed to send code');
        }
    } catch (err) {
        showError('error1', 'Network error. Please try again.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>Send Reset Code</span> <span>→</span>';
    }
});

// Step 2: Verify code
document.getElementById('form2').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn2');
    const code = document.getElementById('code').value.trim();
    
    btn.disabled = true;
    btn.innerHTML = '<span>Verifying...</span> <span>⏳</span>';
    hideError('error2');
    
    try {
        const res = await fetch(`${BACKEND_URL}/api/auth/verify-reset-code`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: currentEmail, code })
        });
        
        const data = await res.json();
        
        if (data.success) {
            tempToken = data.tempToken;
            showStep(3);
        } else {
            showError('error2', data.error || 'Invalid code');
        }
    } catch (err) {
        showError('error2', 'Network error. Please try again.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>Verify Code</span> <span>→</span>';
    }
});

// Step 3: Reset password
document.getElementById('form3').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn3');
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmPassword').value;
    
    if (newPass !== confirmPass) {
        showError('error3', 'Passwords do not match');
        return;
    }
    
    if (newPass.length < 8) {
        showError('error3', 'Password must be at least 8 characters');
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '<span>Resetting...</span> <span>⏳</span>';
    hideError('error3');
    
    try {
        const res = await fetch(`${BACKEND_URL}/api/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tempToken, newPassword: newPass })
        });
        
        const data = await res.json();
        
        if (data.success) {
            document.getElementById('success3').textContent = 'Password reset successful! Redirecting...';
            document.getElementById('success3').classList.add('show');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        } else {
            showError('error3', data.error || 'Failed to reset password');
        }
    } catch (err) {
        showError('error3', 'Network error. Please try again.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>Reset Password</span> <span>→</span>';
    }
});

// Resend code
async function resendCode() {
    if (!currentEmail) return;
    
    const btn = document.querySelector('.resend a');
    btn.style.pointerEvents = 'none';
    btn.textContent = 'Sending...';
    
    try {
        await fetch(`${BACKEND_URL}/api/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: currentEmail })
        });
        
        btn.textContent = 'Code resent!';
        setTimeout(() => {
            btn.textContent = 'Resend code';
            btn.style.pointerEvents = 'auto';
        }, 3000);
    } catch (err) {
        btn.textContent = 'Failed. Try again.';
        btn.style.pointerEvents = 'auto';
    }
}

function showStep(stepNum) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(`step${stepNum}`).classList.add('active');
}

function showError(id, msg) {
    const el = document.getElementById(id);
    el.innerHTML = `<span>⚠️</span> <span>${msg}</span>`;
    el.classList.add('show');
}

function hideError(id) {
    document.getElementById(id).classList.remove('show');
}
</script>

</body>
</html>
