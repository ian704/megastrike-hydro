<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Megastrike Hydro Drilling Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --deep-navy: #0a1628;
    --navy: #0d1b2a;
    --ocean-blue: #1b263b;
    --azure: #415a77;
    --gold: #e9c46a;
    --orange: #f4a261;
    --white: #ffffff;
    --text-light: #e0e1dd;
    --text-muted: #778da9;
    --success: #10b981;
    --error: #ef4444;
    --warning: #f59e0b;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, var(--deep-navy) 0%, var(--navy) 50%, var(--ocean-blue) 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
    color: var(--text-light);
}

/* Animated Background */
.bg-pattern {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
        radial-gradient(circle at 20% 50%, rgba(233, 196, 106, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(244, 162, 97, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(233, 196, 106, 0.02) 0%, transparent 50%);
    z-index: 0;
    pointer-events: none;
}

/* Gold accent line */
.container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gold), var(--orange), var(--gold));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
}

@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* Main Container */
.container {
    background: rgba(27, 38, 59, 0.95);
    backdrop-filter: blur(20px);
    padding: 50px 40px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 
                0 0 0 1px rgba(233, 196, 106, 0.1) inset;
    position: relative;
    z-index: 10;
    animation: slideUp 0.6s ease-out;
    border: 1px solid rgba(233, 196, 106, 0.1);
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Logo Section */
.logo {
    text-align: center;
    margin-bottom: 30px;
}

.logo-img {
    height: 200px;
    width: auto;
    filter: drop-shadow(0 4px 15px rgba(233, 196, 106, 0.3));
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 4px 15px rgba(233, 196, 106, 0.3)); }
    50% { transform: scale(1.02); filter: drop-shadow(0 6px 25px rgba(233, 196, 106, 0.4)); }
}

/* Welcome Text */
.welcome-text {
    text-align: center;
    margin-bottom: 30px;
}

.welcome-text h2 {
    color: white;
    font-size: 1.2rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
}

.welcome-text h2::after {
    content: '';
    display: block;
    width: 50px;
    height: 2px;
    background: var(--gold);
    margin: 15px auto 0;
}

.welcome-text p {
    color: var(--text-muted);
    font-size: 0.95rem;
}

/* Alert Messages */
.alert {
    padding: 14px 16px;
    font-size: 0.9rem;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 10px;
    animation: slideDown 0.3s ease;
    border-left: 3px solid;
}

.alert.show {
    display: flex;
}

.alert.error {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    border-left-color: var(--error);
}

.alert.success {
    background: rgba(16, 185, 129, 0.1);
    color: var(--success);
    border-left-color: var(--success);
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Form Styling */
.form-group {
    position: relative;
    margin-bottom: 20px;
}

.input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1.1rem;
    transition: color 0.3s ease;
    pointer-events: none;
}

input {
    width: 100%;
    padding: 14px 16px 14px 48px;
    border: 1px solid rgba(233, 196, 106, 0.2);
    border-radius: 0;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    transition: all 0.3s ease;
    background: rgba(10, 22, 40, 0.5);
    color: white;
}

input:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(233, 196, 106, 0.1);
}

input:focus + .input-icon {
    color: var(--gold);
}

input::placeholder {
    color: var(--text-muted);
}

.password-toggle {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1.1rem;
    transition: color 0.3s ease;
    user-select: none;
}

.password-toggle:hover {
    color: var(--gold);
}

/* Options Row */
.options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    font-size: 0.9rem;
}

.remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.3s ease;
}

.remember-me:hover {
    color: var(--text-light);
}

.remember-me input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--gold);
    cursor: pointer;
}

.forgot-password {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.85rem;
    transition: color 0.3s ease;
}

.forgot-password:hover {
    color: var(--orange);
    text-decoration: underline;
}

/* Submit Button */
.submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--gold);
    color: var(--deep-navy);
    border: 2px solid var(--gold);
    border-radius: 0;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 25px;
}

.submit-btn:hover {
    background: transparent;
    color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(233, 196, 106, 0.2);
}

.submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.submit-btn.loading {
    color: transparent;
}

.submit-btn.loading::after {
    content: '';
    position: absolute;
    width: 24px;
    height: 24px;
    border: 3px solid rgba(233, 196, 106, 0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.submit-btn.success {
    background: var(--success);
    border-color: var(--success);
    color: white;
}

/* Divider */
.divider {
    display: flex;
    align-items: center;
    margin: 25px 0;
    color: var(--text-muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.divider::before,
.divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(233, 196, 106, 0.2);
}

.divider span {
    padding: 0 15px;
}

/* Social Login */
.social-login {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 25px;
}

.social-btn {
    padding: 12px;
    border: 1px solid rgba(233, 196, 106, 0.2);
    background: rgba(10, 22, 40, 0.5);
    border-radius: 0;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.social-btn:hover {
    border-color: var(--gold);
    background: rgba(233, 196, 106, 0.1);
    color: var(--gold);
    transform: translateY(-2px);
}

.social-icon {
    width: 20px;
    height: 20px;
}

/* Footer */
.footer-text {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-top: 10px;
}

.footer-text a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.footer-text a:hover {
    color: var(--orange);
    text-decoration: underline;
}

/* Security Badge */
.security-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 25px;
    padding-top: 25px;
    border-top: 1px solid rgba(233, 196, 106, 0.1);
    color: var(--text-muted);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.security-badge span:first-child {
    color: var(--success);
}

/* Responsive */
@media (max-width: 480px) {
    .container {
        padding: 40px 25px;
    }

    .logo-img {
        height: 150px;
    }
    
    .social-login {
        grid-template-columns: 1fr;
    }
    
    .options {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
    }
}

/* Input Animation on Load */
.form-group {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.6s ease forwards;
}

.form-group:nth-child(1) { animation-delay: 0.1s; }
.form-group:nth-child(2) { animation-delay: 0.2s; }

@keyframes fadeInUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="bg-pattern"></div>

<div class="container">

    <div class="logo">
    <img src="images/logo.png" alt="Megastrike Hydro Drilling Solutions" class="logo-img">
</div>

    <div class="welcome-text">
        <h2>Welcome Back</h2>
        <p>Sign in to access your dashboard</p>
    </div>

    <div class="alert error" id="errorAlert">
        <span>⚠️</span>
        <span>Invalid email or password</span>
    </div>

    <div class="alert success" id="successAlert">
        <span>✓</span>
        <span>Login successful! Redirecting...</span>
    </div>

    <form id="loginForm" action="/login" method="POST">
        <div class="form-group">
            <span class="input-icon">📧</span>
            <input type="email" id="email" name="email" placeholder="Email Address" required autocomplete="email">
        </div>

        <div class="form-group">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
            <span class="password-toggle" id="togglePassword">👁️</span>
        </div>

        <div class="options">
            <label class="remember-me">
                <input type="checkbox" name="remember" id="remember">
                <span>Remember me</span>
            </label>
            
<div style="text-align: center; margin-top: 15px;">
    <a href="forgot-password.html" style="color: var(--gold); text-decoration: none; font-size: 0.9rem;">
        Forgot Password?
    </a>
</div>

        <button type="submit" class="submit-btn" id="submitBtn">
            <span>Sign In</span>
            <span>→</span>
        </button>
    </form>

    <div class="divider">
        <span>OR</span>
    </div>

    <div class="social-login">
        <button type="button" class="social-btn" onclick="socialLogin('google')">
            <svg class="social-icon" viewBox="0 0 24 24">
                <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span>Google</span>
        </button>
        <button type="button" class="social-btn" onclick="socialLogin('microsoft')">
            <svg class="social-icon" viewBox="0 0 21 21">
                <rect x="1" y="1" width="9" height="9" fill="currentColor"/>
                <rect x="1" y="11" width="9" height="9" fill="currentColor"/>
                <rect x="11" y="1" width="9" height="9" fill="currentColor"/>
                <rect x="11" y="11" width="9" height="9" fill="currentColor"/>
            </svg>
            <span>Microsoft</span>
        </button>
    </div>

    <p class="footer-text">
        Don't have an account? <a href="signup.html">Create account</a>
    </p>

    <div class="security-badge">
        <span>🔒</span>
        <span>Secured with 256-bit encryption</span>
    </div>
</div>

<script>
// Password visibility toggle
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

togglePassword.addEventListener('click', function() {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.textContent = type === 'password' ? '👁️' : '🙈';
});

// Form handling
const form = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');
const errorAlert = document.getElementById('errorAlert');
const successAlert = document.getElementById('successAlert');

form.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    errorAlert.classList.remove('show');
    successAlert.classList.remove('show');
    
    const email = document.getElementById('email').value.trim();
    const password = passwordInput.value;
    const remember = document.getElementById('remember').checked;
    
    if (!email || !password) {
        showError('Please fill in all fields');
        return;
    }
    
    submitBtn.classList.add('loading');
    submitBtn.disabled = true;
    
    try {
        const BACKEND_URL = 'https://megastrike-hydro.onrender.com';

        const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
            localStorage.setItem('token', data.token);
            localStorage.removeItem('user'); 
            
            if (remember) {
                localStorage.setItem('rememberEmail', email);
            } else {
                localStorage.removeItem('rememberEmail');
            }
            
            submitBtn.classList.remove('loading');
            submitBtn.classList.add('success');
            submitBtn.innerHTML = '<span>Welcome Back!</span> <span>✓</span>';
            successAlert.classList.add('show');
            
            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 1000);
        } else {
            throw new Error(data.error || 'Login failed');
        }
    } catch (error) {
        console.error('Login error:', error);
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span>Sign In</span> <span>→</span>';
        showError(error.message || 'Invalid credentials');
    }
});

function showError(message) {
    errorAlert.querySelector('span:last-child').textContent = message;
    errorAlert.classList.add('show');
    
    form.style.animation = 'shake 0.5s ease-in-out';
    setTimeout(() => {
        form.style.animation = '';
    }, 500);
}

const style = document.createElement('style');
style.textContent = `
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
    }
`;
document.head.appendChild(style);

function socialLogin(provider) {
    console.log(`Initiating ${provider} login...`);
    alert(`${provider} login coming soon!`);
}

document.querySelectorAll('input').forEach(input => {
    input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.02)';
    });
    
    input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
    });
});

const rememberCheckbox = document.getElementById('remember');
if (localStorage.getItem('rememberEmail')) {
    document.getElementById('email').value = localStorage.getItem('rememberEmail');
    rememberCheckbox.checked = true;
}

form.addEventListener('submit', function() {
    if (rememberCheckbox.checked) {
        localStorage.setItem('rememberEmail', document.getElementById('email').value);
    } else {
        localStorage.removeItem('rememberEmail');
    }
});
</script>

</body>
</html>
